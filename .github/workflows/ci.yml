name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  alloc-locality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Reject malloc/calloc/realloc/free outside src/userApi/
        run: |
          set +e
          matches=$(git grep -nE '\b(malloc|calloc|realloc|free)\s*\(' \
            -- 'src/' 'test/' \
            ':!src/userApi/' \
            ':!*.md' \
            | grep -vE '^[^:]+:[0-9]+:[[:space:]]*(//|\*)')
          set -e
          if [ -n "$matches" ]; then
            echo "Allocation-locality violation: malloc/calloc/realloc/free are only allowed in src/userApi/."
            echo "All other code must route through reserveMemory/freeReservedMemory in src/userApi/StorageApi.{c,h}."
            echo
            echo "Offending lines:"
            echo "$matches"
            exit 1
          fi

  c-format-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format-21
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          sudo apt-get install -y clang-format-21

      - name: Check format
        run: |
          find src test examples \( -name '*.c' -o -name '*.h' \) -print0 | \
            xargs -0 clang-format-21 --dry-run -Werror

  c-build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build gcc

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync Python deps for build-time generators
        run: uv sync

      - name: Configure
        run: cmake --preset unit_test

      - name: Build
        run: cmake --build --preset unit_test

      - name: Test
        run: ctest --preset unit_test

  c-asan-build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build clang

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync Python deps for build-time generators
        run: uv sync

      - name: Configure
        run: CC=clang cmake --preset unit_test_asan

      - name: Build
        run: cmake --build --preset unit_test_asan

      - name: Test
        run: ctest --preset unit_test_asan

  c-ubsan-build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build gcc

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync Python deps for build-time generators
        run: uv sync

      - name: Configure
        run: CC=gcc cmake --preset unit_test_ubsan

      - name: Build
        run: cmake --build --preset unit_test_ubsan

      - name: Test
        run: ctest --preset unit_test_ubsan

  c-bit-parity:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build gcc

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync Python deps
        run: uv sync

      # Cache the raw dataset downloads (zip + extracted files). The flaky
      # external hosts (timeseriesclassification.com, archive.ics.uci.edu) are
      # only hit on a cache miss; _download_if_missing() skips the network call
      # when the zip is already present. Keyed on the prep scripts so a URL or
      # download-logic change invalidates the cache and forces a fresh fetch.
      - name: Cache raw datasets
        uses: actions/cache@v4
        with:
          path: |
            examples/har_classifier/data/raw
            examples/ecg_anomaly_ae/data/raw
          key: datasets-raw-${{ hashFiles('examples/har_classifier/prepare_data.py', 'examples/ecg_anomaly_ae/prepare_data.py') }}

      - name: Prepare HAR data
        run: uv run examples/har_classifier/prepare_data.py

      - name: Prepare ECG data
        run: uv run examples/ecg_anomaly_ae/prepare_data.py

      - name: Train PyTorch HAR (produces reference predictions + weights)
        run: uv run examples/har_classifier/train_pytorch.py

      - name: Train PyTorch ECG (produces reference reconstructions + weights)
        run: uv run examples/ecg_anomaly_ae/train_pytorch.py

      - name: Configure
        run: cmake --preset examples

      - name: Build example binaries
        run: |
          cmake --build --preset examples --target train_c_har_classifier
          cmake --build --preset examples --target train_c_ecg_anomaly_ae

      - name: Run HAR in BIT_PARITY mode
        run: BIT_PARITY=1 build/examples/examples/har_classifier/train_c_har_classifier

      - name: Run ECG in BIT_PARITY mode
        run: BIT_PARITY=1 build/examples/examples/ecg_anomaly_ae/train_c_ecg_anomaly_ae

      - name: Diff HAR predictions (int32, exact match required)
        run: |
          uv run examples/_shared/compare_predictions.py \
            --pytorch examples/har_classifier/outputs/pytorch_predictions.npy \
            --c examples/har_classifier/outputs/c_predictions.npy \
            --dtype int32

      - name: Diff ECG reconstructions (float32, allclose)
        run: |
          uv run examples/_shared/compare_predictions.py \
            --pytorch examples/ecg_anomaly_ae/outputs/pytorch_reconstructions.npy \
            --c examples/ecg_anomaly_ae/outputs/c_reconstructions.npy \
            --dtype float32 \
            --rtol 1e-4 \
            --atol 1e-5

  python-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Test
        run: uv run pytest
