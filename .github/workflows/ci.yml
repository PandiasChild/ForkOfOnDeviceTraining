name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  c-build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build gcc

      - name: Configure
        run: cmake --preset unit_test

      - name: Build
        run: cmake --build --preset unit_test

      - name: Test
        run: ctest --preset unit_test

  python-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Test
        run: uv run pytest
